version: '3.8'

services:
  # REMOVED local postgres service, using host PostgreSQL instead

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - synkrasis-network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://sriravi:rootroot@host.docker.internal:5432/auton_meta
      - REDIS_URL=redis://redis:6379
      - DOCKER_ENV=true
      - ADMIN_EMAIL=admin@synkrasis.ai
      - ADMIN_PASSWORD=Admin123!
      - ADMIN_FIRST_NAME=System
      - ADMIN_LAST_NAME=Administrator
      - JWT_SECRET=your-super-secret-jwt-key-change-this-in-production
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRATION_MINUTES=1440
    volumes:
      - ../backend:/app
      - /tmp/synkrasis:/tmp/synkrasis
    depends_on:
      - redis
    networks:
      - synkrasis-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - synkrasis-network

networks:
  synkrasis-network:
    driver: bridge
