version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: synkrasis
      POSTGRES_PASSWORD: synkrasis
      POSTGRES_DB: synkrasis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - synkrasis-network

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - synkrasis-network

  backend:
    build: 
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://synkrasis:synkrasis@postgres:5432/synkrasis
      REDIS_URL: redis://redis:6379
    volumes:
      - ../backend:/app
      - /tmp/synkrasis:/tmp/synkrasis
    depends_on:
      - postgres
      - redis
    networks:
      - synkrasis-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - synkrasis-network

  livy:
    image: apache/livy:0.8.0
    ports:
      - "8998:8998"
    environment:
      LIVY_SPARK_MASTER: local[*]
    networks:
      - synkrasis-network

volumes:
  postgres_data:

networks:
  synkrasis-network:
    driver: bridge
